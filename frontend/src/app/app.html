<div class="flex h-screen bg-slate-50 overflow-hidden flex-row">
  <!-- Sidebar -->
  <aside
    class="text-white h-screen transition-all duration-300 flex flex-col z-20 overflow-hidden"
    [class]="sidebarOpen() ? 'w-64' : 'w-20'"
    style="background-color: #EB6424; box-shadow: 4px 0 24px rgba(235,100,36,0.2);"
  >
    <!-- Header -->
    <div
      class="flex items-center h-16 border-b border-white/20 relative"
      [class]="sidebarOpen() ? 'justify-between px-4' : 'justify-center'"
    >
      @if (sidebarOpen()) {
        <div class="flex items-center gap-2 font-bold text-white w-full pr-10">
          <img src="logo.png" alt="Logo" class="w-32 h-auto object-contain" />
        </div>
      }
      <button
        (click)="toggleSidebar()"
        class="text-white hover:bg-white/20 shrink-0 z-10 flex items-center justify-center w-8 h-8 rounded-md transition-colors cursor-pointer"
        [class]="sidebarOpen() ? 'absolute right-2' : ''"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-4 overflow-y-auto space-y-1 px-3">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="nav-active"
          [title]="item.label"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 text-white/80 hover:bg-white/20 hover:text-white no-underline"
          [class.justify-center]="!sidebarOpen()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
          </svg>
          @if (sidebarOpen()) {
            <span class="truncate">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="border-t border-white/20 p-4">
      @if (sidebarOpen()) {
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 overflow-hidden">
            <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-white shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <span class="text-sm font-medium text-white truncate">Vendedor</span>
          </div>
          <button class="text-white hover:bg-white/20 shrink-0 flex items-center justify-center w-8 h-8 rounded-md transition-colors cursor-pointer" title="Sair">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      } @else {
        <div class="flex flex-col gap-4 items-center">
          <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-white shrink-0 cursor-pointer" title="Vendedor">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <button class="text-white hover:bg-white/20 shrink-0 flex items-center justify-center w-8 h-8 rounded-md transition-colors cursor-pointer" title="Sair">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      }
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex flex-col flex-1 min-w-0">
    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
      <div class="mx-auto max-w-7xl">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
